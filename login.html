<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
min-height:100vh;
background:#0f0f1a;
color:white;
overflow-x:hidden;
position:relative;
animation:fadeIn 1s ease;
}

/* Fade In */
@keyframes fadeIn{
from{opacity:0; transform:translateY(10px);}
to{opacity:1; transform:translateY(0);}
}

/* Animated Blobs */
body::before,
body::after{
content:'';
position:absolute;
width:500px;
height:500px;
border-radius:50%;
filter:blur(120px);
z-index:-1;
animation:move 12s infinite alternate;
}

body::before{
background:#7c3aed;
top:-100px;
left:-100px;
}

body::after{
background:#c084ff;
bottom:-100px;
right:-100px;
}

@keyframes move{
from{transform:translate(0,0);}
to{transform:translate(100px,50px);}
}

/* Navbar */
.navbar{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:25px;
padding:12px 25px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(15px);
border-radius:50px;
box-shadow:0 8px 32px rgba(0,0,0,0.4);
z-index:1000;
}

.navbar a{
color:#c084ff;
text-decoration:none;
font-weight:600;
transition:0.3s;
}

.navbar a:hover{
color:white;
text-shadow:0 0 10px #c084ff;
}

/* Title */
.title{
margin-top:140px;
text-align:center;
font-size:50px;
font-weight:700;
background:linear-gradient(45deg,#c084ff,#7c3aed);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

/* Glass Card */
.card{
width:380px;
margin:50px auto;
padding:40px;
border-radius:25px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(20px);
box-shadow:0 10px 40px rgba(0,0,0,0.5);
transition:0.4s;
text-align:center;
}

.card:hover{
transform:translateY(-10px);
box-shadow:0 15px 50px rgba(124,58,237,0.6);
}

/* Inputs */
input{
width:100%;
padding:12px;
margin:12px 0;
border-radius:12px;
border:1px solid rgba(255,255,255,0.1);
background:rgba(255,255,255,0.08);
color:white;
outline:none;
transition:0.3s;
}

input:focus{
border:1px solid #c084ff;
box-shadow:0 0 15px #c084ff;
}

/* Buttons */
button{
padding:12px 25px;
border:none;
border-radius:15px;
background:linear-gradient(45deg,#7c3aed,#c084ff);
color:white;
font-weight:600;
cursor:pointer;
transition:0.3s;
margin-top:15px;
}

button:hover{
transform:scale(1.07);
box-shadow:0 0 25px #c084ff;
}

/* Dark-Light Toggle */
.toggle{
position:fixed;
bottom:30px;
right:30px;
background:#7c3aed;
padding:12px;
border-radius:50%;
cursor:pointer;
box-shadow:0 0 20px #7c3aed;
}

/* Light Mode */
.light{
background:#f4f4f4;
color:black;
}

.light .card{
background:white;
color:black;
}

.light input{
background:#f1f1f1;
color:black;
}

/* Scrollbar */
::-webkit-scrollbar{
width:8px;
}
::-webkit-scrollbar-thumb{
background:#7c3aed;
border-radius:10px;
}
#waveCanvas{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-2;
pointer-events:none;
}

@media(max-width:768px){
.title{font-size:38px;margin-top:170px;}
.subtitle{font-size:15px;}
.section{padding:35px 25px;}
}
</style>
</head>
<body>

<h1>Login</h1>
<div class="card">
<input type="email" id="email" placeholder="Email">
<input type="password" id="pass" placeholder="Password">
<button onclick="login()">Login</button>
<p id="msg"></p>
</div>
<canvas id="waveCanvas"></canvas>
<script>
function login(){
let user=JSON.parse(localStorage.getItem("student"));
let email=document.getElementById("email").value;
let pass=document.getElementById("pass").value;

if(user && user.email===email && user.pass===pass){
document.getElementById("msg").innerText="Login Successful!";
setTimeout(()=>{window.location="index.html"},1000);
}else{
document.getElementById("msg").innerText="Invalid Credentials!";
}
}
const canvas=document.getElementById("waveCanvas");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let mouse={x:null,y:null};

window.addEventListener("mousemove",e=>{
mouse.x=e.x;
mouse.y=e.y;
waves.push(new Wave(mouse.x,mouse.y));
});

window.addEventListener("resize",()=>{
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
});

class Wave{
constructor(x,y){
this.x=x;
this.y=y;
this.radius=0;
this.alpha=0.5;
}
draw(){
ctx.beginPath();
ctx.arc(this.x,this.y,this.radius,0,Math.PI*2);
ctx.strokeStyle="rgba(192,132,255,"+this.alpha+")";
ctx.lineWidth=2;
ctx.stroke();
}
update(){
this.radius+=2;
this.alpha-=0.01;
this.draw();
}
}

let waves=[];

function animate(){
ctx.clearRect(0,0,canvas.width,canvas.height);
waves.forEach((wave,index)=>{
wave.update();
if(wave.alpha<=0){waves.splice(index,1);}
});
requestAnimationFrame(animate);
}
animate();

</script>

</body>
</html>
