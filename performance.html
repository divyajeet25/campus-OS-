<!DOCTYPE html>
<html>
<head>
<title>Performance - Campus OS</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');

*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
min-height:100vh;
background:#0f0f1a;
color:white;
overflow-x:hidden;
position:relative;
padding-top:140px;
}

/* Animated Blobs */
body::before, body::after{
content:'';
position:absolute;
width:500px;height:500px;
border-radius:50%;
filter:blur(120px);
z-index:-1;
animation:move 12s infinite alternate;
}
body::before{background:#7c3aed;top:-100px;left:-100px;}
body::after{background:#c084ff;bottom:-100px;right:-100px;}
@keyframes move{from{transform:translate(0,0);}to{transform:translate(100px,50px);}}

/* Navbar */
.navbar{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:18px;
padding:12px 30px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(25px);
border-radius:60px;
border:1px solid rgba(255,255,255,0.15);
box-shadow:0 10px 35px rgba(0,0,0,0.6);
}
.navbar a{
text-decoration:none;
font-weight:600;
font-size:14px;
padding:10px 18px;
border-radius:30px;
background:rgba(255,255,255,0.1);
color:white;
transition:0.3s;
}
.navbar a:hover{
background:linear-gradient(45deg,#7c3aed,#c084ff);
box-shadow:0 0 20px #c084ff;
transform:translateY(-3px);
}

/* Dashboard Layout */
.dashboard{
width:90%;
max-width:1000px;
margin:auto;
display:grid;
grid-template-columns:1fr 1fr;
gap:30px;
}

.card{
padding:30px;
border-radius:30px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(20px);
box-shadow:0 15px 50px rgba(0,0,0,0.6);
transition:0.3s;
}
.card:hover{
transform:translateY(-5px);
box-shadow:0 15px 50px rgba(124,58,237,0.6);
}

.stats{
grid-column:span 2;
text-align:center;
}

.stats h3{
margin:10px 0;
color:#c084ff;
}
#waveCanvas{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-2;
pointer-events:none;
}

@media(max-width:768px){
.title{font-size:38px;margin-top:170px;}
.subtitle{font-size:15px;}
.section{padding:35px 25px;}
}
</style>
</head>
<body>

<div class="navbar">
<a href="index.html">Home</a>
<a href="cgpa.html">CGPA</a>
<a href="attendance.html">Attendance</a>
</div>
<canvas id="waveCanvas"></canvas>
<div class="dashboard">

<div class="card">
<h2>CGPA Trend</h2>
<canvas id="cgpaChart"></canvas>
</div>

<div class="card">
<h2>Attendance</h2>
<canvas id="attendanceChart"></canvas>
</div>

<div class="card stats">
<h2>Performance Stats</h2>
<h3 id="avg"></h3>
<h3 id="max"></h3>
<h3 id="attempts"></h3>
<h3 id="attendanceText"></h3>
</div>

</div>

<script>
let cgpaData=JSON.parse(localStorage.getItem("cgpaHistory"))||[];
let attendance=localStorage.getItem("attendance")||0;

let labels=cgpaData.map(item=>item.semester);
let values=cgpaData.map(item=>item.value);

let avg=values.length?(values.reduce((a,b)=>a+b,0)/values.length).toFixed(2):0;
let max=values.length?Math.max(...values):0;

document.getElementById("avg").innerText="Average CGPA: "+avg;
document.getElementById("max").innerText="Highest CGPA: "+max;
document.getElementById("attempts").innerText="Total Attempts: "+values.length;
document.getElementById("attendanceText").innerText="Attendance: "+attendance+"%";

/* CGPA Chart */
new Chart(document.getElementById("cgpaChart"),{
type:'line',
data:{
labels:labels,
datasets:[{
label:"CGPA",
data:values,
borderColor:"#c084ff",
backgroundColor:"rgba(192,132,255,0.2)",
tension:0.4
}]
},
options:{scales:{y:{beginAtZero:true,max:10}}}
});

/* Attendance Chart */
new Chart(document.getElementById("attendanceChart"),{
type:'doughnut',
data:{
labels:["Attendance","Remaining"],
datasets:[{
data:[attendance,100-attendance],
backgroundColor:["#7c3aed","#1a1a2e"]
}]
}
});
const canvas=document.getElementById("waveCanvas");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let mouse={x:null,y:null};

window.addEventListener("mousemove",e=>{
mouse.x=e.x;
mouse.y=e.y;
waves.push(new Wave(mouse.x,mouse.y));
});

window.addEventListener("resize",()=>{
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
});

class Wave{
constructor(x,y){
this.x=x;
this.y=y;
this.radius=0;
this.alpha=0.5;
}
draw(){
ctx.beginPath();
ctx.arc(this.x,this.y,this.radius,0,Math.PI*2);
ctx.strokeStyle="rgba(192,132,255,"+this.alpha+")";
ctx.lineWidth=2;
ctx.stroke();
}
update(){
this.radius+=2;
this.alpha-=0.01;
this.draw();
}
}

let waves=[];

function animate(){
ctx.clearRect(0,0,canvas.width,canvas.height);
waves.forEach((wave,index)=>{
wave.update();
if(wave.alpha<=0){waves.splice(index,1);}
});
requestAnimationFrame(animate);
}
animate();

</script>

</body>
</html>
